
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sondage - Université de Lomé 2026</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#f0f2f5;
  font-family:'Segoe UI',Arial,sans-serif;
  display:flex;
  justify-content:center;
  min-height:100vh;
  padding-bottom:40px;
}

.app{max-width:700px;width:100%}

.hero{position:relative;height:220px;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.2),rgba(0,0,0,.8));
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  color:#fff;text-align:center;padding:10px
}
.hero h1{font-size:22px;font-weight:800}
.hero p{font-size:13px;color:#ffe}

.flag-bar{display:flex;height:5px}
.f1{flex:1;background:#006b3d}
.f2{flex:1;background:#ffce00}
.f3{flex:1;background:#d21034}

.card{
  background:#fff;margin:10px;border-radius:12px;
  padding:15px;box-shadow:0 2px 6px rgba(0,0,0,.08)
}

.hidden{display:none}

.profil-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px
}
.pc{
  background:#fff;border:2px solid #eee;
  border-radius:12px;padding:15px;text-align:center;
  cursor:pointer;transition:.2s
}
.pc.sel{border-color:#25d366;background:#f0fff4}

.btn{
  background:#25d366;color:#fff;
  border:none;padding:12px;border-radius:10px;
  width:calc(100% - 20px);margin:10px;
  font-weight:700;cursor:pointer
}

.sect-title{
  font-size:11px;font-weight:700;color:#8696a0;
  letter-spacing:.07em;text-transform:uppercase;
  padding:14px 10px 6px;
}

.qcard{
  background:#fff;margin:10px;border-radius:12px;
  padding:15px;box-shadow:0 1px 4px rgba(0,0,0,.08)
}
.qtitle{font-weight:700;margin-bottom:10px;font-size:14px;line-height:1.4}

.opt{
  display:flex;gap:10px;
  padding:8px;background:#f4f4f4;
  border-radius:8px;margin-bottom:6px;
  cursor:pointer;font-size:13px;align-items:center;
}

input[type=text],textarea{
  width:100%;padding:10px;border-radius:10px;
  border:1px solid #ddd;font-family:inherit;font-size:13px;
}
textarea{resize:vertical;min-height:70px}

.echelle{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.ech-btn{
  flex:1;min-width:46px;padding:9px 4px;
  border:1px solid #ddd;border-radius:10px;
  text-align:center;cursor:pointer;
  font-size:12px;font-weight:700;color:#555;
  background:#f4f4f4;line-height:1.3;
}
.ech-btn.on{background:#25d366;color:#fff;border-color:#25d366}
.ech-lbl{font-size:9px;display:block;font-weight:500;margin-top:2px}

.progress{background:#ddd;height:6px;border-radius:10px;margin:10px}
.bar{height:6px;background:#25d366;width:0%;border-radius:10px;transition:width .3s}

.thanks{text-align:center;padding:40px}
</style>
</head>

<body>
<div class="app">

<div class="hero">
  <img src="https://i.ibb.co/GQf9vsMT/Universit-de-Lom-Togo-orientation-bacheliers.jpg">
  <div class="hero-overlay">
    <h1>Sondage UL 2026</h1>
    <p>Surpopulation • Infrastructures • Formation</p>
  </div>
</div>
<div class="flag-bar"><div class="f1"></div><div class="f2"></div><div class="f3"></div></div>

<div id="profilPage">
  <div class="card">Choisissez votre profil pour commencer</div>
  <div class="profil-grid">
    <div class="pc" onclick="pick('etudiant')" id="etudiant">🎓 Étudiant</div>
    <div class="pc" onclick="pick('prof')" id="prof">📚 Enseignant</div>
    <div class="pc" onclick="pick('admin')" id="admin">🏛️ Admin</div>
  </div>
  <button class="btn" onclick="start()">Commencer</button>
</div>

<div id="surveyPage" class="hidden">
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div id="questions"></div>
  <button class="btn" onclick="submit()">Envoyer</button>
</div>

<div id="thanks" class="hidden thanks">
  <h2>Merci 🙏</h2>
  <p>Réponses enregistrées</p>
</div>

</div>

<script>

let profil=null;

const data={
 etudiant:[
  {sect:"PROFIL"},
  {q:"Statut actuel a l UL ?",t:"radio",o:["Etudiant(e) actuellement inscrit(e)","Ancien(ne) etudiant(e)"]},
  {q:"Votre age",t:"text",ph:"Ex : 22"},
  {q:"Votre genre",t:"radio",o:["Masculin","Feminin","Prefere ne pas repondre"]},
  {q:"Faculte ou departement",t:"text",ph:"Ex : FASEG, FDS, FLESH, FDD..."},
  {q:"Niveau d etudes",t:"radio",o:["Licence 1","Licence 2","Licence 3","Master 1","Master 2","Doctorat"]},

  {sect:"SURPOPULATION"},
  {q:"Combien d etudiants dans vos cours ?",t:"radio",o:["Moins de 100","Entre 100 et 300","Entre 300 et 600","Plus de 600"]},
  {q:"La surpopulation gene votre apprentissage ?",t:"radio",o:["Oui, enormement","Oui, un peu","Non, pas vraiment","Non, pas du tout"]},
  {q:"De quelle maniere la surpopulation affecte votre capacite a suivre les cours ?",t:"long",ph:"Decrivez votre experience..."},
  {q:"Avez-vous deja manque un cours faute de place en amphitheatre ?",t:"radio",o:["Oui","Non","Parfois"]},
  {q:"Comment gerez-vous les difficultes liees a la surpopulation ?",t:"long",ph:"Decrivez vos strategies..."},

  {sect:"INFRASTRUCTURES"},
  {q:"Etat des salles de cours",t:"echelle",labels:["Tres mauvais","Mauvais","Moyen","Bon","Excellent"]},
  {q:"Acces a la bibliotheque ?",t:"radio",o:["Oui, bien equipee","Oui, mais limitee","Non, pas acces"]},
  {q:"Acces a Internet sur le campus ?",t:"radio",o:["Oui, stable et gratuit","Oui, mais instable","Non, aucun acces"]},
  {q:"Ameliorations les plus urgentes a l UL ?",t:"check",o:["Construire de nouvelles salles","Ameliorer la bibliotheque","Developper l acces a internet","Recruter plus d enseignants","Limiter les inscriptions"]},

  {sect:"FORMATION"},
  {q:"Etes-vous satisfait(e) de la qualite de la formation recue a l UL ?",t:"radio",o:["Tres satisfait","Satisfait","Peu satisfait","Pas du tout satisfait"]},
  {q:"Les programmes sont-ils adaptes au marche de l emploi ?",t:"radio",o:["Oui, tres bien","Partiellement","Peu adaptes","Pas du tout"]},
  {q:"Regularite des enseignants",t:"radio",o:["Toujours reguliers","Souvent","Rarement","Tres irreguliers"]},
  {q:"Ameliorations souhaitees en priorite",t:"long",ph:"Vos suggestions..."}
 ],

 prof:[
  {sect:"PROFIL"},
  {q:"Grade ou fonction",t:"radio",o:["Professeur titulaire","Maitre de conferences","Assistant","Vacataire","Autre"]},
  {q:"Annees d exercice a l UL",t:"radio",o:["Moins de 3 ans","3 a 10 ans","10 a 20 ans","Plus de 20 ans"]},
  {q:"Faculte ou departement",t:"text",ph:"Ex : FASEG, FDS..."},

  {sect:"SURPOPULATION"},
  {q:"Effectif moyen dans vos cours",t:"radio",o:["Moins de 100","100 a 300","300 a 600","Plus de 600"]},
  {q:"La surpopulation affecte votre enseignement ?",t:"radio",o:["Oui, tres fortement","Oui, assez","Un peu","Non"]},
  {q:"Defis concrets rencontres",t:"check",o:["Difficultes d evaluation individuelle","Manque de temps par etudiant","Logistique lourde","Amphitheatres inadaptes","Impossibilite de TP"]},
  {q:"Comment gerez-vous les defis lies a la surpopulation ?",t:"long",ph:"Decrivez vos approches..."},

  {sect:"INFRASTRUCTURES"},
  {q:"Adequation de vos equipements de travail",t:"echelle",labels:["Pas du tout","Tres peu","Partiellement","Bien equipe","Tres bien"]},
  {q:"Infrastructures les plus urgentes",t:"check",o:["Construire de nouvelles salles","Ameliorer la bibliotheque","Developper l acces a internet","Recruter plus d enseignants","Limiter les inscriptions"]},

  {sect:"FORMATION"},
  {q:"Etes-vous satisfait(e) de la qualite de la formation a l UL ?",t:"radio",o:["Tres satisfait","Satisfait","Peu satisfait","Pas du tout satisfait"]},
  {q:"Les programmes sont-ils regulierement mis a jour ?",t:"radio",o:["Oui, regulierement","Rarement","Jamais","Je ne sais pas"]},
  {q:"Reformes que vous proposez",t:"long",ph:"Vos propositions..."}
 ],

 admin:[
  {sect:"PROFIL"},
  {q:"Votre fonction",t:"text",ph:"Ex : Scolarite, Doyen, RH..."},
  {q:"Annees de service a l UL",t:"radio",o:["Moins de 3 ans","3 a 10 ans","10 a 20 ans","Plus de 20 ans"]},

  {sect:"SURPOPULATION"},
  {q:"Flux moyen d etudiants que vous gerez",t:"radio",o:["Moins de 500","500 a 2000","2000 a 5000","Plus de 5000"]},
  {q:"Outils pour gerer les effectifs ?",t:"radio",o:["Oui, outils numeriques performants","Oui, mais insuffisants","Non, gestion manuelle"]},
  {q:"Politique de limitation des admissions ?",t:"radio",o:["Oui, appliquee strictement","Oui, mais peu respectee","Non"]},
  {q:"Comment l administration gere les defis lies a la surpopulation ?",t:"long",ph:"Decrivez les mesures prises..."},

  {sect:"INFRASTRUCTURES"},
  {q:"Adequation des infrastructures aux besoins",t:"echelle",labels:["Tres inadaptees","Inadaptees","Moyennement","Adaptees","Tres adaptees"]},
  {q:"Budget alloue aux infrastructures suffisant ?",t:"radio",o:["Oui, tres suffisant","Partiellement","Insuffisant","Tres insuffisant"]},
  {q:"Infrastructures les plus urgentes",t:"check",o:["Construire de nouvelles salles","Ameliorer la bibliotheque","Developper l acces a internet","Recruter plus d enseignants","Limiter les inscriptions"]},

  {sect:"QUALITE"},
  {q:"Etes-vous satisfait(e) de la qualite de la formation a l UL ?",t:"radio",o:["Tres satisfait","Satisfait","Peu satisfait","Pas du tout satisfait"]},
  {q:"Reformes institutionnelles recommandees",t:"long",ph:"Vos recommandations..."},
  {q:"Observations generales sur la situation a l UL",t:"long",ph:"Remarques libres..."}
 ]
};

function pick(p){
 profil=p;
 document.querySelectorAll('.pc').forEach(e=>e.classList.remove('sel'));
 document.getElementById(p).classList.add('sel');
}

function start(){
 if(!profil) return alert("Choisis un profil");
 document.getElementById("profilPage").classList.add("hidden");
 document.getElementById("surveyPage").classList.remove("hidden");
 load();
}

function load(){
 const box=document.getElementById("questions");
 box.innerHTML="";
 let qNum=0;

 data[profil].forEach((q,i)=>{
  if(q.sect){
   let s=document.createElement("div");
   s.className="sect-title";
   s.textContent=q.sect;
   box.appendChild(s);
   return;
  }

  qNum++;
  let div=document.createElement("div");
  div.className="qcard";
  div.setAttribute("data-i",i);

  let html=`<div class="qtitle">${qNum}. ${q.q}</div>`;

  if(q.t==="text"){
   html+=`<input type="text" placeholder="${q.ph||''}">`;
  }

  if(q.t==="long"){
   html+=`<textarea placeholder="${q.ph||''}"></textarea>`;
  }

  if(q.t==="radio"){
   q.o.forEach(o=>{
    html+=`<label class="opt"><input type="radio" name="q${i}" value="${o}"> ${o}</label>`;
   });
  }

  if(q.t==="check"){
   q.o.forEach(o=>{
    html+=`<label class="opt"><input type="checkbox" value="${o}"> ${o}</label>`;
   });
  }

  if(q.t==="echelle"){
   html+=`<div class="echelle">`;
   q.labels.forEach((l,idx)=>{
    html+=`<button class="ech-btn" onclick="selEch(this,'q${i}')">${idx+1}<span class="ech-lbl">${l}</span></button>`;
   });
   html+=`</div>`;
  }

  div.innerHTML=html;
  box.appendChild(div);
 });

 updateProgress();
}

function selEch(btn,name){
 document.querySelectorAll(`[onclick*="${name}"]`).forEach(b=>b.classList.remove('on'));
 btn.classList.add('on');
 updateProgress();
}

function updateProgress(){
 const total=document.querySelectorAll(".qcard").length;
 let filled=0;
 document.querySelectorAll(".qcard").forEach(card=>{
  if(card.querySelector("input:checked")||card.querySelector(".ech-btn.on")) filled++;
  else{
   const t=card.querySelector("input[type=text]");
   const ta=card.querySelector("textarea");
   if((t&&t.value.trim())||(ta&&ta.value.trim())) filled++;
  }
 });
 document.getElementById("bar").style.width=(filled/total)*100+"%";
}

document.addEventListener("change",updateProgress);
document.addEventListener("input",updateProgress);

function submit(){
 let res={profil};
 let qNum=0;

 data[profil].forEach((q,i)=>{
  if(q.sect) return;
  qNum++;
  const card=document.querySelector(`[data-i="${i}"]`);
  if(!card) return;

  if(q.t==="text"){
   const inp=card.querySelector("input[type=text]");
   if(inp) res["q"+qNum]=inp.value;
  }
  if(q.t==="long"){
   const ta=card.querySelector("textarea");
   if(ta) res["q"+qNum]=ta.value;
  }
  if(q.t==="radio"){
   const r=card.querySelector("input:checked");
   if(r) res["q"+qNum]=r.value;
  }
  if(q.t==="check"){
   const checked=card.querySelectorAll("input:checked");
   const vals=[];
   checked.forEach(c=>vals.push(c.value));
   if(vals.length) res["q"+qNum]=vals.join(", ");
  }
  if(q.t==="echelle"){
   const btn=card.querySelector(".ech-btn.on");
   if(btn) res["q"+qNum]=btn.textContent.trim();
  }
 });

 fetch("/api/submit",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(res)
 });

 document.getElementById("surveyPage").classList.add("hidden");
 document.getElementById("thanks").classList.remove("hidden");
}

</script>

</body>
</html>
