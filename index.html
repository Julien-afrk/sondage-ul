<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sondage - Université de Lomé 2026</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#f0f2f5;
  font-family:'Segoe UI',Arial,sans-serif;
  display:flex;
  justify-content:center;
  min-height:100vh;
  padding-bottom:40px;
}

.app{max-width:700px;width:100%}

/* HERO */
.hero{position:relative;height:220px;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.2),rgba(0,0,0,.8));
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  color:#fff;text-align:center;padding:10px
}
.hero h1{font-size:22px;font-weight:800}
.hero p{font-size:13px;color:#ffe}

.flag-bar{display:flex;height:5px}
.f1{flex:1;background:#006b3d}
.f2{flex:1;background:#ffce00}
.f3{flex:1;background:#d21034}

/* CARD */
.card{
  background:#fff;margin:10px;border-radius:12px;
  padding:15px;box-shadow:0 2px 6px rgba(0,0,0,.08)
}

.hidden{display:none}

/* PROFIL */
.profil-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px
}
.pc{
  background:#fff;border:2px solid #eee;
  border-radius:12px;padding:15px;text-align:center;
  cursor:pointer;transition:.2s
}
.pc.sel{border-color:#25d366;background:#f0fff4}

/* BUTTON */
.btn{
  background:#25d366;color:#fff;
  border:none;padding:12px;border-radius:10px;
  width:calc(100% - 20px);margin:10px;
  font-weight:700;cursor:pointer
}

/* QUESTIONS */
.qcard{
  background:#fff;margin:10px;border-radius:12px;
  padding:15px;box-shadow:0 1px 4px rgba(0,0,0,.08)
}
.qtitle{font-weight:700;margin-bottom:10px}

.opt{
  display:flex;gap:10px;
  padding:8px;background:#f4f4f4;
  border-radius:8px;margin-bottom:6px;
  cursor:pointer
}

input[type=text],textarea{
  width:100%;padding:10px;border-radius:10px;
  border:1px solid #ddd
}

/* PROGRESS */
.progress{
  background:#ddd;height:6px;border-radius:10px;margin:10px
}
.bar{height:6px;background:#25d366;width:0%}

/* THANK YOU */
.thanks{
  text-align:center;padding:40px
}
</style>
</head>

<body>

<div class="app">

<!-- HERO -->
<div class="hero">
  <img src="https://i.ibb.co/GQf9vsMT/Universit-de-Lom-Togo-orientation-bacheliers.jpg">
  <div class="hero-overlay">
    <h1>Sondage UL 2026</h1>
    <p>Surpopulation • Infrastructures • Formation</p>
  </div>
</div>

<div class="flag-bar"><div class="f1"></div><div class="f2"></div><div class="f3"></div></div>

<!-- PROFIL -->
<div id="profilPage">
  <div class="card">
    Choisissez votre profil pour commencer
  </div>

  <div class="profil-grid">
    <div class="pc" onclick="pick('etudiant')" id="etudiant">🎓 Étudiant</div>
    <div class="pc" onclick="pick('prof')" id="prof">📚 Enseignant</div>
    <div class="pc" onclick="pick('admin')" id="admin">🏛️ Admin</div>
  </div>

  <button class="btn" onclick="start()">Commencer</button>
</div>

<!-- SURVEY -->
<div id="surveyPage" class="hidden">

<div class="progress"><div class="bar" id="bar"></div></div>

<div id="questions"></div>

<button class="btn" onclick="submit()">Envoyer</button>

</div>

<!-- THANK YOU -->
<div id="thanks" class="hidden thanks">
  <h2>Merci 🙏</h2>
  <p>Réponses enregistrées</p>
</div>

</div>

<script>

let profil=null;

const data={
 etudiant:[
  {q:"Ton âge ?",t:"text"},
  {q:"Surpopulation en cours ?",t:"radio",o:["Oui","Non","Un peu"]},
  {q:"Qualité des salles ?",t:"radio",o:["Mauvaise","Moyenne","Bonne"]}
 ],
 prof:[
  {q:"Années d'expérience ?",t:"radio",o:["<3","3-10","10+"]},
  {q:"Effectif étudiants ?",t:"radio",o:["<100","100-300","300+"]}
 ],
 admin:[
  {q:"Gestion des effectifs ?",t:"radio",o:["Bonne","Moyenne","Difficile"]}
 ]
};

function pick(p){
 profil=p;
 document.querySelectorAll('.pc').forEach(e=>e.classList.remove('sel'));
 document.getElementById(p).classList.add('sel');
}

function start(){
 if(!profil) return alert("Choisis un profil");

 document.getElementById("profilPage").classList.add("hidden");
 document.getElementById("surveyPage").classList.remove("hidden");

 load();
}

function load(){
 const box=document.getElementById("questions");
 box.innerHTML="";

 data[profil].forEach((q,i)=>{

  let div=document.createElement("div");
  div.className="qcard";

  let html=`<div class="qtitle">${q.q}</div>`;

  if(q.t==="text"){
    html+=`<input type="text" data-i="${i}">`;
  }

  if(q.t==="radio"){
    q.o.forEach(o=>{
      html+=`
      <label class="opt">
        <input type="radio" name="q${i}" value="${o}">
        ${o}
      </label>`;
    });
  }

  div.innerHTML=html;
  box.appendChild(div);
 });

 updateProgress();
}

function updateProgress(){
 const total=document.querySelectorAll(".qcard").length;
 const filled=document.querySelectorAll("input:checked, input[type=text]").length;

 document.getElementById("bar").style.width=(filled/total)*100+"%";
}

document.addEventListener("change",updateProgress);
document.addEventListener("input",updateProgress);

function submit(){

 let res={profil};

 document.querySelectorAll(".qcard").forEach((card,i)=>{

  let text=card.querySelector("input[type=text]");
  let radio=card.querySelector("input:checked");

  if(text) res["q"+i]=text.value;
  if(radio) res["q"+i]=radio.value;

 });

 fetch("/api/submit",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(res)
 });

 document.getElementById("surveyPage").classList.add("hidden");
 document.getElementById("thanks").classList.remove("hidden");
}

</script>

</body>
</html>
